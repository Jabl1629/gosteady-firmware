# Sysbuild config for GoSteady firmware (M10.7.1).
#
# The Thingy:91 X board's `sysbuild.cmake` defaults to forcing
# PM_STATIC_YML_FILE = thingy91x_nrf9151_pm_static.yml — the factory
# layout. We're carving the unused tail of external flash into
# crash_forensics / telemetry_queue / snippet_storage in our own
# `pm_static.yml`, so we need to opt out of the factory override.
#
# THINGY91X_NO_PREDEFINED_LAYOUT is the supported (if "EXPERIMENTAL"-
# tagged) escape hatch; it disables the board's set(PM_STATIC_YML_FILE
# CACHE INTERNAL) and lets the partition manager fall back to the
# project-level pm_static.yml lookup at $APPLICATION_CONFIG_DIR.
#
# Side-effect: this also unsets the BOOTLOADER choice default that the
# factory layout otherwise drives. We re-add the explicit selection
# below so the b0 + MCUboot stack still gets built (matches what the
# factory layout would have set, and matches our existing prj.conf
# Kconfig). External-flash MCUboot-secondary stays on too — same
# rationale as the factory layout.
SB_CONFIG_THINGY91X_NO_PREDEFINED_LAYOUT=y
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_SECURE_BOOT_APPCORE=y
SB_CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
SB_CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y
SB_CONFIG_MCUBOOT_USE_ALL_AVAILABLE_RAM=y
