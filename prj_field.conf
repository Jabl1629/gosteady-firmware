# --- GoSteady firmware: deployment (field) build overlay ---
#
# Apply on top of prj.conf with:
#   west build -b thingy91x/nrf9151/ns -- -DEXTRA_CONF_FILE=prj_field.conf
#
# Adds the GOSTEADY_FIELD_MODE flag which gates off bench-only paths
# in src/main.c (SW0, uart1 dump channel, heartbeat LEDs, recording
# LED) per the M10.5 spec. Default `prj.conf` builds keep bench mode.
#
# Phase 5 (this file) is just the Kconfig flag + main.c gating. Other
# deployment-mode features (cellular MQTT, pre-activation blue LED,
# crash forensics, snippets, OTA partition lock-in, etc.) come in
# their own milestones and may add more entries here.

CONFIG_GOSTEADY_FIELD_MODE=y

# Cloud bring-up — deployment always wants cloud (heartbeat + activity
# + snippet uplinks per M10.5). Mirrored from prj_cloud.conf so a
# single overlay covers the whole deployment build; if either changes,
# update both. Same content; tracking pattern matches FIELD_MODE
# precedent of overlays-as-self-contained-mode-bundles.
CONFIG_GOSTEADY_CLOUD_ENABLE=y

CONFIG_AWS_IOT=y
CONFIG_AWS_IOT_CLIENT_ID_STATIC="GS9999999999"
CONFIG_AWS_IOT_BROKER_HOST_NAME="a2dl73jkjzv6h5-ats.iot.us-east-1.amazonaws.com"
CONFIG_AWS_IOT_TOPIC_UPDATE_DELTA_SUBSCRIBE=n
CONFIG_AWS_IOT_TOPIC_GET_ACCEPTED_SUBSCRIBE=n
CONFIG_AWS_IOT_TOPIC_GET_REJECTED_SUBSCRIBE=n
CONFIG_AWS_IOT_AUTO_DEVICE_SHADOW_REQUEST=n

CONFIG_MQTT_HELPER=y
CONFIG_MQTT_HELPER_SEC_TAG=201
CONFIG_MQTT_HELPER_STACK_SIZE=4096
CONFIG_MQTT_KEEPALIVE=1200
CONFIG_MQTT_CLEAN_SESSION=y

CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y

CONFIG_HEAP_MEM_POOL_SIZE=8192

# nPM1300 fuel gauge (M10.7.2). Same block as prj_cloud.conf. Real
# battery_pct + battery_mv into heartbeat instead of M12.1c.1's 0.5
# placeholder.
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NRF_FUEL_GAUGE_VARIANT_SECONDARY_CELL=y
CONFIG_REGULATOR=y
CONFIG_I2C=y
CONFIG_SENSOR=y
