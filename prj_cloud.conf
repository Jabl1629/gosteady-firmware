# --- GoSteady firmware: cloud (AWS IoT MQTT/TLS) overlay ---
#
# Apply on top of prj.conf with:
#   west build -b thingy91x/nrf9151/ns -- -DEXTRA_CONF_FILE=prj_cloud.conf
#
# Use when you want to exercise the M12.1c.1+ cloud path on the bench
# unit while keeping all bench tooling (SW0, uart1 dump, capture.html,
# pull_sessions.py, BLE, LEDs) intact. The deployment image
# (prj_field.conf) includes the same block inline so deployment builds
# need only that single overlay.
#
# Same content lives in prj_field.conf; if you change one, mirror the
# other.

# Project flag: gates src/cloud.c compilation (see CMakeLists.txt) AND
# main.c's call to gosteady_cloud_init(). Without this, the AWS_IOT
# Kconfig below is dead weight — the lib is pulled in but never used.
CONFIG_GOSTEADY_CLOUD_ENABLE=y

# ──────────────────────────────────────────────────────────────────────
# AWS IoT Core MQTT/TLS — minimum-viable heartbeat publish (M12.1c.1)
# ──────────────────────────────────────────────────────────────────────
#
# Pulls in the NCS aws_iot lib + its transitive networking deps. Owns
# the cloud publish path; src/cloud.c is the integration glue. Cert
# material lives in the modem CryptoCell-312 secure store at sec_tag 201
# (provisioned at flash time via tools/flash_cert.py + nrfcredstore;
# bench cert GS9999999999 from the cloud team's 2026-04-27 handoff).
#
# CONFIG_AWS_IOT_CLIENT_ID_STATIC = MQTT client ID = AWS IoT Thing name.
# Hardcoded to bench cert here for M12.1c.1; M12.1c.2 / M14.5 will
# parameterize per-device for the shipping units (likely via a Kconfig
# in prj_field.conf, or via a runtime hw_id read).
#
# Default broker port 8883 is the AWS IoT MQTT/TLS endpoint (per coord
# doc §C.4.2). Amazon Root CA 1 is pinned via the cert provisioned at
# the same sec_tag (slot type 0); the aws_iot lib loads it implicitly
# from the modem secure store rather than from a Kconfig string.
#
# CONFIG_MQTT_KEEPALIVE=1200 is the AWS IoT max — keeping it long here
# because we're firing single-shot heartbeats followed by an immediate
# disconnect, so a long keepalive doesn't cost us anything (the connection
# is short-lived anyway). M12.1c.2 with hourly cadence + persistent
# connection may want this lower.
#
# Auto-shadow topic subscriptions are explicitly disabled: M12.1c.1
# doesn't read shadow at all (no provisioning/activation flow yet —
# that's M12.1e.2). Subscribing to those topics during the one-shot
# connect would just slow down the connection setup with extra
# round-trips for SUBACKs we don't need.
CONFIG_AWS_IOT=y
CONFIG_AWS_IOT_CLIENT_ID_STATIC="GS9999999999"
CONFIG_AWS_IOT_BROKER_HOST_NAME="a2dl73jkjzv6h5-ats.iot.us-east-1.amazonaws.com"
CONFIG_AWS_IOT_TOPIC_UPDATE_DELTA_SUBSCRIBE=n
CONFIG_AWS_IOT_TOPIC_GET_ACCEPTED_SUBSCRIBE=n
CONFIG_AWS_IOT_TOPIC_GET_REJECTED_SUBSCRIBE=n

# CRITICAL: disable the lib's auto-shadow-get on connect. Default y
# publishes to $aws/things/GS9999999999/shadow/get immediately after
# CONNACK. Our per-thing IoT policy (gosteady-dev-device-policy) only
# permits MQTT publish on gs/{thing}/{heartbeat,activity,alert,snippet}
# — NOT on shadow topics. iot:GetThingShadow in the policy is the REST
# API permission, not the MQTT-publish-to-shadow-get permission. Without
# this disable, broker silently disconnects us ~4 s after CONNECTED for
# the policy violation, before our heartbeat PUBACK can return.
# Discovered 2026-04-27 during M12.1c.1 first-publish validation.
# Will need to be re-enabled (with policy update) for M12.1e.2 Shadow
# re-check on every cellular wake.
CONFIG_AWS_IOT_AUTO_DEVICE_SHADOW_REQUEST=n

# Bump aws_iot lib log level so its internal events (broker disconnects,
# subscribe failures, etc.) surface on uart0 — saves a debug round-trip
# the next time something goes wrong at the lib layer.
CONFIG_AWS_IOT_LOG_LEVEL_DBG=y

CONFIG_MQTT_HELPER=y
CONFIG_MQTT_HELPER_SEC_TAG=201
CONFIG_MQTT_HELPER_STACK_SIZE=4096
CONFIG_MQTT_KEEPALIVE=1200
CONFIG_MQTT_CLEAN_SESSION=y

# Networking + sockets — modem TLS offload via NET_SOCKETS_OFFLOAD.
# These were intentionally omitted at M12.1a (just modem attach + AT
# commands, no sockets); they land here with the first MQTT path.
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y

# Heap headroom for mbedTLS handshake + MQTT helper buffers.
# 8 KB is what the upstream aws_iot sample uses; if we hit OOM
# during TLS handshake bump this first.
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ──────────────────────────────────────────────────────────────────────
# nPM1300 fuel gauge (M10.7.2)
# ──────────────────────────────────────────────────────────────────────
#
# Replaces the M12.1c.1 battery_pct=0.5 placeholder with real readings
# from the nPM1300 charger sensor + nrf_fuel_gauge SoC estimator. Cloud
# heartbeat reads via gosteady_battery_get() — both battery_pct (0.0-1.0)
# and battery_mv become real numbers.
#
# REGULATOR + I2C are required by the nPM1300 driver stack; they're
# normally pulled in transitively by the charger Kconfig but we list
# them explicitly because subtle Kconfig ordering changes upstream
# would otherwise drop them silently.
#
# REQUIRES_FULL_LIBC is selected by NRF_FUEL_GAUGE Kconfig (the lib
# uses log/exp/etc.); listed here for documentation only.
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NRF_FUEL_GAUGE_VARIANT_SECONDARY_CELL=y
CONFIG_REGULATOR=y
CONFIG_I2C=y
CONFIG_SENSOR=y
