# --- GoSteady firmware: baseline config ---
# This file is the minimum needed to build a blinky target for the
# Thingy:91 X (nRF9151 non-secure). Features get added incrementally as
# the firmware arc progresses (sensors, flash, BLE, USB, cellular, ...).

# Core
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_GPIO=y

# Logging over serial console
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Useful diagnostics during bring-up
CONFIG_PRINTK=y
CONFIG_THREAD_NAME=y
CONFIG_RESET_ON_FATAL_ERROR=n

# Motion sensors (Milestone 2). Individual driver and bus symbols
# (CONFIG_BMI270, CONFIG_BMI270_BUS_SPI, CONFIG_ADXL367, CONFIG_ADXL367_BUS_I2C)
# auto-select from the devicetree once the nodes are enabled in the overlay.
CONFIG_SENSOR=y

# External flash (Milestone 3). LittleFS session storage on the
# GD25LE255E SPI flash. Enabling LITTLEFS + the PM region hint makes the
# NCS partition manager carve a `littlefs_storage` partition out of the
# free space on `external_flash`. Access it from code as
# `FIXED_PARTITION_ID(littlefs_storage)`.
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y
CONFIG_PM_PARTITION_SIZE_LITTLEFS=0x800000

# Session logging (Milestone 4). BASE64 is used to ship the final 256-byte
# session header over UART so the Python dry-run ingest script can parse it
# without USB mass-storage (which lands in Milestone 5). Entropy driver
# provides the 16 random bytes for session_uuid (UUIDv4); on nRF91 NS the
# backend is the PSA RNG exposed by TF-M (see zephyr,entropy = &psa_rng
# in the DTS).
CONFIG_BASE64=y
CONFIG_ENTROPY_GENERATOR=y

# Milestone 5: USB dump channel. uart1 (routed via nRF5340 connectivity
# bridge to /dev/cu.usbmodem105 on host) runs a line protocol that lists,
# streams, and deletes files from /lfs/sessions. UART_INTERRUPT_DRIVEN is
# how the dump thread collects RX bytes without busy-waiting.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# Session writer thread uses k_poll to wait on "sample in queue" OR
# "stop requested" in a single blocking call.
CONFIG_POLL=y

# Surface thread stack overflows as a clean fault print rather than a
# silent hang — M5 hit exactly that while sizing the dump thread.
CONFIG_STACK_SENTINEL=y

# Milestone 6a: session-control command parser. Zephyr's JSON library
# handles the 12-field PRE-WALK payload; schema descriptors live in
# src/control.c.
CONFIG_JSON_LIBRARY=y

# Milestone 10: V1 distance estimator on-device. Floating-point printf
# support is needed so the ALGO_V1 log line in src/session.c renders
# distance_ft / R / motion durations as actual numbers instead of the
# `*float*` placeholder. CBPRINTF_FP_SUPPORT enables Zephyr's compact
# format printing of %f / %.2f. The algo modules themselves use sqrtf
# from libm — picolibc (the default libc on this build) provides it.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Milestone 12.1a: cellular bring-up. nrf_modem_lib drives the LTE-M
# modem firmware in a dedicated SRAM region (already reserved in the
# build's partitions.yml). lte_link_control wraps the modem AT
# interface in a state machine + event callback for registration /
# RRC / PSM / mode events. PSM module is included now even though
# we're not idle-sleeping yet — the modem's PSM negotiation happens
# at attach time, so enabling it later would require a re-attach.
#
# nrf_modem_at provides the synchronous AT command interface used in
# src/cellular.c for AT+CESQ / AT%XSNRSQ / AT+CCLK?.
#
# No CONFIG_NETWORKING / CONFIG_NET_SOCKETS yet — those land with MQTT
# in M12.1c. Keeping this milestone strictly to "modem alive +
# attached + signal stats + network time."
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_LC_EDRX_MODULE=y
CONFIG_LTE_LC_CONN_EVAL_MODULE=y

# Power architecture Phase 1a: ADXL367 wake-on-motion trigger.
#
# The ADXL367 stays online continuously at low-power motion-detect
# settings (~1 µA). When sustained motion crosses the activity
# threshold, the chip raises INT1 (P0.11), the Zephyr driver fires
# a `SENSOR_TRIG_THRESHOLD` callback, and we log the event. Same
# infrastructure becomes the wake source for nRF9151 deep sleep
# and the auto-start trigger for sessions in later phases.
#
# TRIGGER_GLOBAL_THREAD: shares the system workqueue rather than
# spawning a dedicated trigger thread — cheaper and fine for our
# infrequent motion events.
#
# ACTIVITY_TIME=12 (samples) at the upstream-default ODR=12.5 Hz
# means ~1 s sustained motion is required before a trigger fires —
# rejects single-tap accidental wakes (door slam, walker bumping
# wall) but reacts within a step or two of real walker motion.
#
# ACTIVITY_THRESHOLD=80 raw at 2g range ≈ 40 mg. Empirical bench-
# tuned default; adjust with `west build -- -DCONFIG_ADXL367_ACTIVITY_THRESHOLD=N`
# without code changes if a clinic deployment needs a different
# sensitivity.
CONFIG_ADXL367_TRIGGER_GLOBAL_THREAD=y
CONFIG_ADXL367_ACTIVITY_DETECTION_MODE=y
CONFIG_ADXL367_INACTIVITY_DETECTION_MODE=y
# Production-tuned wake-on-motion settings.
#
# At 100 Hz ODR + ±2g range:
#   ACTIVITY_TIME=10 samples = 100 ms sustained motion required
#     (filters out single taps / cable bumps / table thump while still
#      reacting within ~2 walker-cap impulses — typical step impulse is
#      ~50 ms wide)
#   ACTIVITY_THRESHOLD=200 raw ≈ 49 mg
#     (about 5× the bench noise floor of ~10 mg per the M9 data; well
#      above any thermal/EMC drift but well below normal handling motion)
#   INACTIVITY_TIME=3000 samples = 30 s of stillness for "no-motion"
#   INACTIVITY_THRESHOLD=80 raw ≈ 20 mg
#
# These get re-tuned once the deployment custom housing is on and we
# have real walking traces from the field; for now they're conservative.
CONFIG_ADXL367_ACTIVITY_TIME=10
CONFIG_ADXL367_ACTIVITY_THRESHOLD=200
CONFIG_ADXL367_INACTIVITY_TIME=3000
CONFIG_ADXL367_INACTIVITY_THRESHOLD=80
