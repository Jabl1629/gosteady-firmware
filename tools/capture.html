<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>GoSteady v1 Capture</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #141822;
      --panel-2: #1b2130;
      --ink: #e8ecf4;
      --ink-dim: #9aa3b8;
      --accent: #6aa7ff;
      --ok: #3bd671;
      --bad: #ff4d5a;
      --warn: #f3b14a;
      --done: #2a6e4c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--panel);
      padding: 12px 16px 10px; padding-top: calc(12px + env(safe-area-inset-top, 0));
      border-bottom: 1px solid #232a3c;
      display: flex; gap: 12px; align-items: center;
    }
    header h1 {
      font-size: 15px; margin: 0; font-weight: 600; flex: 1; letter-spacing: -0.01em;
    }
    #conn-btn {
      padding: 10px 16px; border-radius: 10px; border: 0; font-size: 14px; font-weight: 600;
      background: var(--accent); color: white;
    }
    #conn-btn.connected { background: var(--ok); }
    #conn-state { font-size: 12px; color: var(--ink-dim); }
    #conn-state.connected { color: var(--ok); }
    #conn-state.disconnected { color: var(--bad); }

    #status-card {
      margin: 12px 16px; padding: 14px 16px; background: var(--panel);
      border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px 12px; font-size: 13px;
    }
    #status-card .label { color: var(--ink-dim); }
    #status-card .value { text-align: right; font-variant-numeric: tabular-nums; }
    .session-on  { color: var(--ok); font-weight: 600; }
    .session-off { color: var(--ink-dim); }

    main { padding: 0 16px 140px; } /* pad to keep content above fixed STOP */

    .surface-group {
      margin: 14px 0; background: var(--panel); border-radius: 12px; overflow: hidden;
    }
    .surface-group > h2 {
      margin: 0; padding: 12px 14px; font-size: 14px; font-weight: 600;
      background: var(--panel-2); border-bottom: 1px solid #232a3c;
      display: flex; align-items: center; gap: 10px;
    }
    .surface-group > h2 .count {
      margin-left: auto; font-size: 12px; color: var(--ink-dim); font-weight: 500;
    }

    .run-list { list-style: none; padding: 6px 6px 8px; margin: 0; }
    .run-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 6px; border-radius: 10px;
    }
    .run-row .idx {
      flex: 0 0 26px; text-align: center; font-size: 11px; color: var(--ink-dim);
      font-variant-numeric: tabular-nums;
    }
    .run-btn {
      flex: 1; padding: 12px 14px; border-radius: 10px; border: 0;
      background: var(--panel-2); color: var(--ink); text-align: left;
      font-size: 13px; line-height: 1.35; font-family: inherit;
      display: flex; flex-direction: column; gap: 2px; min-height: 56px;
    }
    .run-btn:active { background: #263042; }
    .run-btn:disabled { opacity: 0.55; }
    .run-btn .title { font-weight: 600; }
    .run-btn .meta { font-size: 11px; color: var(--ink-dim); }
    .run-btn.active {
      outline: 2px solid var(--accent); background: #1d293e;
    }
    .run-row.completed .run-btn {
      background: var(--done);
    }
    .run-row.completed .run-btn .meta { color: #cfe4d9; }
    .run-badge {
      flex: 0 0 auto; min-width: 36px; padding: 4px 8px; border-radius: 999px;
      background: transparent; color: var(--ink-dim); font-size: 11px;
      font-variant-numeric: tabular-nums; text-align: right;
    }
    .run-row.completed .run-badge { color: #cfe4d9; }

    footer {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
      background: linear-gradient(to top, var(--bg) 70%, rgba(11,13,18,0));
      display: flex; gap: 10px;
    }
    #stop-btn {
      flex: 1; padding: 18px; border-radius: 14px; border: 0;
      background: var(--bad); color: white; font-size: 18px; font-weight: 700;
      font-family: inherit;
    }
    #stop-btn:disabled { background: #5a2428; color: #b08890; }
    #log-toggle {
      flex: 0 0 auto; padding: 18px 16px; border-radius: 14px; border: 1px solid #232a3c;
      background: var(--panel); color: var(--ink); font-size: 14px;
    }

    #log {
      margin: 14px 16px 120px; background: #000; border-radius: 10px;
      padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px; max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      display: none; color: #9aa3b8;
    }
    #log.open { display: block; }
    #log .tx { color: #6aa7ff; }
    #log .rx { color: #3bd671; }
    #log .err { color: #ff4d5a; }
    #log .sys { color: #f3b14a; }

    .reset-row { margin: 18px 16px; text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .reset-row button {
      background: transparent; border: 1px solid #232a3c; color: var(--ink-dim);
      padding: 10px 14px; border-radius: 10px; font-size: 12px;
      font-family: inherit;
    }
    .reset-row button.primary {
      background: var(--panel); color: var(--ink); border-color: #2c3446;
    }

    /* ---- M3 post-walk overlay --------------------------------------- */
    #pw-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.55);
      display: none; align-items: flex-end; justify-content: center;
      padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
    }
    #pw-overlay.open { display: flex; }
    .pw-card {
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      background: var(--panel); border-radius: 16px;
      padding: 18px 18px 14px; color: var(--ink);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .pw-card h2 {
      margin: 0 0 4px; font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    }
    .pw-card .pw-meta {
      margin: 0 0 14px; font-size: 12px; color: var(--ink-dim);
      font-variant-numeric: tabular-nums;
    }
    .pw-quick {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .pw-btn {
      padding: 16px 10px; border-radius: 12px; border: 0;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; color: white;
    }
    .pw-btn.pw-good    { background: var(--ok); }
    .pw-btn.pw-discard { background: var(--bad); }
    .pw-btn.pw-notes   { background: var(--accent); }
    .pw-btn.pw-back {
      background: transparent; color: var(--ink-dim);
      border: 1px solid #2c3446;
    }
    .pw-btn.pw-save { background: var(--ok); }
    .pw-btn:disabled { opacity: 0.5; }

    .pw-subpanel { display: none; margin-top: 14px; }
    .pw-subpanel.open { display: block; }
    .pw-subpanel label {
      display: block; margin: 10px 0 3px; font-size: 12px; color: var(--ink-dim);
    }
    .pw-subpanel input[type=number],
    .pw-subpanel input[type=text],
    .pw-subpanel textarea,
    .pw-subpanel select {
      width: 100%; padding: 10px; border-radius: 8px;
      background: var(--panel-2); border: 1px solid #2c3446;
      color: var(--ink); font-size: 14px; font-family: inherit;
      box-sizing: border-box;
    }
    .pw-subpanel textarea { resize: vertical; min-height: 56px; }
    .pw-subpanel .pw-row-2 {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .pw-subpanel .pw-form-actions {
      display: flex; gap: 8px; margin-top: 14px;
    }
    .pw-subpanel .pw-form-actions .pw-btn { flex: 1; padding: 14px; }
    .pw-subpanel .pw-hint {
      font-size: 11px; color: var(--ink-dim); margin: 4px 0 0; line-height: 1.4;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>GoSteady v1 Capture</h1>
    <div id="conn-state" class="disconnected">Disconnected</div>
  </div>
  <button id="conn-btn">Connect</button>
</header>

<div id="status-card">
  <div class="label">Session</div>
  <div class="value session-off" id="session-state">idle</div>
  <div class="label">Runs this capture</div>
  <div class="value" id="session-count">0</div>
  <div class="label">Last response</div>
  <div class="value" id="last-response">—</div>
</div>

<main id="run-matrix"></main>

<div class="reset-row">
  <button id="export-btn" class="primary">Export capture notes (JSON)</button>
  <button id="reset-btn">Reset completed-row tracking (new capture)</button>
</div>

<div id="log"></div>

<!-- M3 post-walk overlay -------------------------------------------- -->
<div id="pw-overlay" role="dialog" aria-modal="true" aria-labelledby="pw-title">
  <div class="pw-card">
    <h2 id="pw-title">Run <span id="pw-run-idx"></span> complete</h2>
    <p class="pw-meta" id="pw-meta"></p>

    <!-- Primary quick actions -->
    <div class="pw-quick" id="pw-quick">
      <button class="pw-btn pw-good"    type="button" data-pw-action="good">✓ Good</button>
      <button class="pw-btn pw-discard" type="button" data-pw-action="discard">✗ Discard</button>
      <button class="pw-btn pw-notes"   type="button" data-pw-action="notes">📝 Notes</button>
    </div>

    <!-- Discard reason (shown after tapping Discard) -->
    <div class="pw-subpanel" id="pw-discard-panel">
      <label for="pw-discard-reason">Discard reason</label>
      <select id="pw-discard-reason">
        <option value="bad_mount">bad_mount</option>
        <option value="sensor_glitch">sensor_glitch</option>
        <option value="incomplete_run" selected>incomplete_run</option>
        <option value="wrong_course">wrong_course</option>
        <option value="interruption">interruption</option>
        <option value="operator_error">operator_error</option>
      </select>
      <label for="pw-discard-notes">Free notes (optional)</label>
      <textarea id="pw-discard-notes" rows="2" placeholder="e.g. dog walked through course"></textarea>
      <div class="pw-form-actions">
        <button class="pw-btn pw-back" type="button" data-pw-action="back">Back</button>
        <button class="pw-btn pw-save" type="button" data-pw-action="save-discard">Save discard</button>
      </div>
    </div>

    <!-- Full notes form (shown after tapping Notes) -->
    <div class="pw-subpanel" id="pw-notes-panel">
      <label>Valid?</label>
      <select id="pw-valid">
        <option value="Y" selected>Y — keep this run</option>
        <option value="N">N — discard</option>
      </select>

      <div class="pw-row-2">
        <div>
          <label for="pw-actual">Actual distance (ft)</label>
          <input id="pw-actual" type="number" inputmode="decimal" step="0.1" placeholder="(same as intended)" />
        </div>
        <div>
          <label for="pw-subj-speed">Subjective speed</label>
          <select id="pw-subj-speed">
            <option value="">(same as intended)</option>
            <option value="slow">slow</option>
            <option value="normal">normal</option>
            <option value="fast">fast</option>
          </select>
        </div>
      </div>

      <div class="pw-row-2">
        <div>
          <label for="pw-steps">Manual step count</label>
          <input id="pw-steps" type="number" inputmode="numeric" placeholder="(optional)" />
        </div>
        <div>
          <label for="pw-notes-discard">Discard reason</label>
          <select id="pw-notes-discard">
            <option value="">(none — valid run)</option>
            <option value="bad_mount">bad_mount</option>
            <option value="sensor_glitch">sensor_glitch</option>
            <option value="incomplete_run">incomplete_run</option>
            <option value="wrong_course">wrong_course</option>
            <option value="interruption">interruption</option>
            <option value="operator_error">operator_error</option>
          </select>
        </div>
      </div>

      <label for="pw-events">Events (semicolon-separated)</label>
      <input id="pw-events" type="text" placeholder="e.g. stumble@0:07;pickup@0:15" />
      <p class="pw-hint">Format: <code>&lt;event&gt;@&lt;mm:ss&gt;</code>. Events vocab: stumble, pickup, setdown, obstacle, interruption.</p>

      <label for="pw-free">Free notes</label>
      <textarea id="pw-free" rows="2" placeholder="any observations"></textarea>

      <div class="pw-form-actions">
        <button class="pw-btn pw-back" type="button" data-pw-action="back">Back</button>
        <button class="pw-btn pw-save" type="button" data-pw-action="save-full">Save</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <button id="stop-btn" disabled>STOP</button>
  <button id="log-toggle">Log</button>
  <button id="log-export">Export Log</button>
  <button id="log-clear">Clear Log</button>
</footer>

<script>
(() => {
  'use strict';

  // NUS UUIDs (all lower-case for Web Bluetooth).
  const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const NUS_RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
  const NUS_TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

  // Fields that are constant across every v1 run.
  const COMMON = {
    subject_id:   'S00',
    walker_type:  'two_wheel',
    cap_type:     'glide',
    walker_model: 'unspecified',
    mount_config: 'front_left_leg',
    operator:     'jace',
  };

  // 30-run matrix, from GoSteady_Capture_Protocol_v1.docx.
  // Keys match the annotation spreadsheet columns exactly.
  const RUNS = [
    // Indoor polished concrete — runs 1..10
    { idx: 1,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'warmup' },
    { idx: 2,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 20, intended_speed: 'slow',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 3,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 4,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 20, intended_speed: 'fast',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 5,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'variance repeat' },
    { idx: 6,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_long',     intended_distance_ft: 40, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'long distance' },
    { idx: 7,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_short',    intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 8,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_curve',    intended_distance_ft: 20, intended_speed: 'normal', direction: 's_curve',  run_type: 'normal',              note: 'weave 2 cones' },
    { idx: 9,  group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 0,  intended_speed: 'slow',   direction: 'straight', run_type: 'stationary_baseline', note: '30s parked' },
    { idx: 10, group: 'indoor_polished_concrete', surface: 'polished_concrete', course_id: 'concrete_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'stumble',             note: 'simulated near-trip' },

    // Outdoor concrete sidewalk — runs 11..20
    { idx: 11, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'warmup' },
    { idx: 12, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 20, intended_speed: 'slow',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 13, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 14, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 20, intended_speed: 'fast',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 15, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'variance repeat' },
    { idx: 16, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_long',     intended_distance_ft: 40, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'long distance' },
    { idx: 17, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_short',    intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 18, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_curve',    intended_distance_ft: 20, intended_speed: 'normal', direction: 's_curve',  run_type: 'normal',              note: 'weave 2 cones' },
    { idx: 19, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 0,  intended_speed: 'slow',   direction: 'straight', run_type: 'stationary_baseline', note: '30s parked' },
    { idx: 20, group: 'outdoor_concrete_sidewalk', surface: 'outdoor_concrete', course_id: 'sidewalk_straight', intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'pickup',              note: 'walker lifted briefly' },

    // Indoor low-pile carpet — runs 21..30
    { idx: 21, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'warmup' },
    { idx: 22, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 20, intended_speed: 'slow',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 23, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 24, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 20, intended_speed: 'fast',   direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 25, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'variance repeat' },
    { idx: 26, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_long',     intended_distance_ft: 30, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: 'long (indoor limit 30 ft)' },
    { idx: 27, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_short',    intended_distance_ft: 10, intended_speed: 'normal', direction: 'straight', run_type: 'normal',              note: '' },
    { idx: 28, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_curve',    intended_distance_ft: 15, intended_speed: 'normal', direction: 's_curve',  run_type: 'normal',              note: 'furniture weave, 15 ft' },
    { idx: 29, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 0,  intended_speed: 'slow',   direction: 'straight', run_type: 'stationary_baseline', note: '30s parked' },
    { idx: 30, group: 'indoor_low_pile_carpet', surface: 'low_pile_carpet', course_id: 'carpet_A_straight', intended_distance_ft: 20, intended_speed: 'normal', direction: 'straight', run_type: 'stumble',             note: 'simulated near-trip' },
  ];

  const GROUP_LABEL = {
    indoor_polished_concrete: 'Indoor polished concrete',
    outdoor_concrete_sidewalk: 'Outdoor concrete sidewalk',
    indoor_low_pile_carpet:   'Indoor low-pile carpet',
  };

  // ---- State --------------------------------------------------------

  let bleDevice = null;
  let rxChar = null;
  let txChar = null;
  let rxBuffer = '';
  let sessionActive = false;
  let activeRunIdx = null;      // which preset row is currently recording
  let activeSessionUuid = null; // device-assigned UUID of currently-recording session
  const completions = {};       // idx -> [{timestamp, duration_ms}, ...]
  let sessionCount = 0;         // total successful starts this page session

  // POST-WALK notes, keyed by session_uuid. Joined against .dat files
  // at ingest time (tools/ingest_capture.py).
  const postWalkNotes = {};     // uuid -> { run_idx, completed_utc, valid, ... }

  // Set by the STOP handler before the M3 popup opens, so the popup
  // handlers know which run they're saving against even after
  // setSessionActive(false) has cleared activeRunIdx.
  let pwContext = null;         // { uuid, run_idx, run, sample_count }

  // ---- DOM ----------------------------------------------------------

  const $ = (id) => document.getElementById(id);
  const connBtn  = $('conn-btn');
  const connState = $('conn-state');
  const sessionStateEl = $('session-state');
  const sessionCountEl = $('session-count');
  const lastRespEl = $('last-response');
  const stopBtn = $('stop-btn');
  const logEl = $('log');
  const logToggle = $('log-toggle');
  const resetBtn = $('reset-btn');

  // ---- Logging ------------------------------------------------------
  //
  // Three-tier persistence so a refresh / crash / browser eviction
  // doesn't lose diagnostic context:
  //
  //   (1) DOM       — last 80 entries shown in the Log panel.
  //   (2) localStorage — full buffer (capped at LOG_MAX_ENTRIES) under
  //                      LOG_LS_KEY. Restored on page load. Survives
  //                      ordinary navigation + reload.
  //   (3) Disk      — auto-downloaded on FATAL pattern in any rx line,
  //                   and via the manual Export Log button. Lands in
  //                   ~/Downloads as gosteady_capture_log_<stamp>.log.
  //                   Recommended: move into raw_sessions/<date>/ at end
  //                   of capture day, alongside the .dat files.
  //
  // Even if localStorage gets wiped (incognito, site-data clear, browser
  // sandbox eviction), tier (3) gives a disk copy of any session that
  // ended in a fault.

  const LOG_LS_KEY = 'gosteady_capture_log_v1';
  const LOG_MAX_ENTRIES = 10000;
  let logEntries = [];
  let logSaveTimer = null;
  let lastAutoExportEpoch = 0;

  function log(kind, text) {
    const now = new Date();
    const t = now.toTimeString().slice(0, 8);
    const ts = now.toISOString();

    // (1) DOM render — same look as before.
    const span = document.createElement('span');
    span.className = kind;
    span.textContent = `[${t}] ${text}\n`;
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
    while (logEl.children.length > 80) logEl.removeChild(logEl.firstChild);

    // (2) Persistent buffer.
    logEntries.push({ ts, t, kind, text });
    if (logEntries.length > LOG_MAX_ENTRIES) {
      logEntries.splice(0, logEntries.length - LOG_MAX_ENTRIES);
    }
    // Debounce localStorage writes — bursts of log lines (e.g. on
    // connect or a flurry of STATUS responses) shouldn't each pay the
    // serialization cost. 250 ms is short enough that nothing important
    // is lost on a sudden tab close.
    if (logSaveTimer === null) {
      logSaveTimer = setTimeout(() => {
        logSaveTimer = null;
        try {
          localStorage.setItem(LOG_LS_KEY, JSON.stringify(logEntries));
        } catch (e) {
          // Quota exceeded → halve the buffer and retry once.
          logEntries.splice(0, Math.floor(logEntries.length / 2));
          try { localStorage.setItem(LOG_LS_KEY, JSON.stringify(logEntries)); }
          catch (_) { /* give up — disk export still has copies */ }
        }
      }, 250);
    }

    // (3) Auto-download on FATAL/HardFault. Rate-limit to once per 30 s
    // so an unstoppable fault loop doesn't spam ~/Downloads.
    if (/FATAL|HardFault|BUS FAULT|MEM MANAGE/i.test(text)) {
      const now = Date.now();
      if (now - lastAutoExportEpoch > 30_000) {
        lastAutoExportEpoch = now;
        // Flush localStorage immediately so the export reflects this entry.
        if (logSaveTimer) { clearTimeout(logSaveTimer); logSaveTimer = null; }
        try { localStorage.setItem(LOG_LS_KEY, JSON.stringify(logEntries)); }
        catch (_) {}
        exportLog('fault');
      }
    }
  }

  function loadLog() {
    try {
      const raw = localStorage.getItem(LOG_LS_KEY);
      if (!raw) return;
      const restored = JSON.parse(raw);
      if (!Array.isArray(restored) || restored.length === 0) return;
      logEntries = restored;
      // Re-render the most recent 80 to DOM. Older entries stay only in
      // the persistent buffer (visible via Export Log).
      const recent = logEntries.slice(-80);
      for (const e of recent) {
        const span = document.createElement('span');
        span.className = e.kind || 'sys';
        span.textContent = `[${e.t}] ${e.text}\n`;
        logEl.appendChild(span);
      }
      logEl.scrollTop = logEl.scrollHeight;
      // Use console.log here, not the persistent log(), to avoid
      // recursion + to keep the restore note out of the saved buffer.
      console.log(`gosteady: restored ${logEntries.length} log entries from localStorage`);
    } catch (e) {
      console.warn('log restore failed:', e);
    }
  }

  function exportLog(reason) {
    if (logEntries.length === 0) {
      log('sys', 'no log entries to export');
      return;
    }
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const suffix = reason ? `_${reason}` : '';
    const filename = `gosteady_capture_log_${stamp}${suffix}.log`;
    const lines = logEntries.map(e =>
      `${e.ts} [${(e.kind || 'sys').toUpperCase().padEnd(3, ' ')}] ${e.text}`
    );
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
    log('sys', `exported ${logEntries.length} log entries → ${filename}`
        + (reason ? ` (auto, reason=${reason})` : ''));
  }

  function clearLog() {
    if (!confirm(`Clear all ${logEntries.length} stored log entries? `
                 + 'This wipes both the in-page log and localStorage. '
                 + 'Disk-exported copies are unaffected.')) return;
    logEntries = [];
    localStorage.removeItem(LOG_LS_KEY);
    while (logEl.firstChild) logEl.removeChild(logEl.firstChild);
    log('sys', 'log cleared');
  }

  // Best-effort flush on tab close. Synchronous localStorage write has
  // to be inside a beforeunload handler — async download attempts are
  // killed by the browser at this point.
  window.addEventListener('beforeunload', () => {
    if (logSaveTimer) {
      clearTimeout(logSaveTimer);
      try { localStorage.setItem(LOG_LS_KEY, JSON.stringify(logEntries)); }
      catch (_) {}
    }
  });

  logToggle.addEventListener('click', () => logEl.classList.toggle('open'));

  // ---- BLE ----------------------------------------------------------

  async function connect() {
    try {
      log('sys', 'requesting device…');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ services: [NUS_SERVICE] }],
      });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      log('sys', `picked ${bleDevice.name || '(unnamed)'}, connecting…`);
      const server = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(NUS_SERVICE);
      rxChar = await service.getCharacteristic(NUS_RX_UUID);
      txChar = await service.getCharacteristic(NUS_TX_UUID);
      await txChar.startNotifications();
      txChar.addEventListener('characteristicvaluechanged', onNotify);
      onConnected();
    } catch (e) {
      log('err', `connect failed: ${e.message || e}`);
      onDisconnected();
    }
  }

  async function disconnect() {
    if (bleDevice && bleDevice.gatt.connected) {
      try { bleDevice.gatt.disconnect(); } catch (_) {}
    }
    onDisconnected();
  }

  function onConnected() {
    connBtn.textContent = 'Disconnect';
    connBtn.classList.add('connected');
    connState.textContent = 'Connected';
    connState.className = 'connected';
    stopBtn.disabled = false;
    // Auto-open the log panel on connect — useful while we're still
    // shaking bugs out; easy to close again via the Log button.
    logEl.classList.add('open');
    log('sys', 'connected');
    // Re-render so the run buttons pick up the newly-available rxChar
    // (they were disabled at initial page-load time when we had no BLE).
    renderMatrix();
    // Kick off a status poll
    sendCommand('STATUS');
  }

  function onDisconnected() {
    connBtn.textContent = 'Connect';
    connBtn.classList.remove('connected');
    connState.textContent = 'Disconnected';
    connState.className = 'disconnected';
    stopBtn.disabled = true;
    rxChar = null; txChar = null;
    setSessionActive(false);
    // setSessionActive is a no-op if state didn't change, so force a
    // re-render to propagate the loss of rxChar to the row buttons.
    renderMatrix();
    log('sys', 'disconnected');
  }

  function onNotify(event) {
    const decoder = new TextDecoder();
    rxBuffer += decoder.decode(event.target.value);
    let nl;
    while ((nl = rxBuffer.indexOf('\n')) !== -1) {
      const line = rxBuffer.slice(0, nl).replace(/\r$/, '');
      rxBuffer = rxBuffer.slice(nl + 1);
      handleResponseLine(line);
    }
  }

  function handleResponseLine(line) {
    if (!line) return;
    log('rx', `← ${line}`);
    lastRespEl.textContent = line.length > 24 ? line.slice(0, 24) + '…' : line;

    if (line.startsWith('STATUS active=1')) {
      setSessionActive(true);
    } else if (line.startsWith('STATUS active=0')) {
      setSessionActive(false);
    } else if (line.startsWith('OK started')) {
      // "OK started <uuid>" — parse the UUID off the end. Fallback to
      // null if we got a bare "OK started" (shouldn't happen with
      // post-2026-04-22 firmware but keep the tolerance).
      const parts = line.split(/\s+/);
      activeSessionUuid = parts.length >= 3 ? parts[2] : null;
      setSessionActive(true);
    } else if (line.startsWith('OK samples=')) {
      // Capture the sample count + run idx + uuid BEFORE
      // setSessionActive clears them, so we can hand a complete
      // context to the M3 popup.
      const m = line.match(/^OK samples=(\d+)/);
      const sampleCount = m ? parseInt(m[1], 10) : null;
      const uuid = activeSessionUuid;
      const runIdx = activeRunIdx;
      const run = RUNS.find(r => r.idx === runIdx) || null;
      setSessionActive(false);
      activeSessionUuid = null;
      if (runIdx !== null && uuid && run) {
        pwContext = { uuid, run_idx: runIdx, run, sample_count: sampleCount };
        showPostWalkPopup();
      }
    } else if (line.startsWith('ERR')) {
      /* leave session state as-is */
    }
  }

  async function sendCommand(line) {
    if (!rxChar) { log('err', 'not connected'); return false; }
    try {
      const bytes = new TextEncoder().encode(line + '\n');
      // Chunk to stay inside the ATT MTU window. Empirically, a single
      // ~270-byte START payload either triggers Chrome's long-write
      // fallback (Prepare+Execute Write) or exceeds the bridge's NUS RX
      // reassembly path, and the 91 never sees a newline-terminated line
      // — no OK, no ERR, just silence. Splitting into <=180B chunks keeps
      // every write inside writeValueWithoutResponse's fast path for any
      // reasonable negotiated MTU (>=23 legacy, typically 247 on Nordic).
      // See GOSTEADY_CONTEXT.md "Key Design Decisions" for the rationale
      // on chunking vs. rearchitecting the protocol.
      const CHUNK = 180;
      for (let off = 0; off < bytes.length; off += CHUNK) {
        const slice = bytes.subarray(off, Math.min(off + CHUNK, bytes.length));
        try {
          await rxChar.writeValueWithoutResponse(slice);
        } catch (_) {
          await rxChar.writeValueWithResponse(slice);
        }
      }
      log('tx', `→ ${line.length > 80 ? line.slice(0, 77) + '…' : line}`);
      return true;
    } catch (e) {
      log('err', `write failed: ${e.message || e}`);
      return false;
    }
  }

  // ---- Session state ------------------------------------------------

  function setSessionActive(active) {
    if (sessionActive === active) return;
    sessionActive = active;
    sessionStateEl.textContent = active ? 'RECORDING' : 'idle';
    sessionStateEl.className = 'value ' + (active ? 'session-on' : 'session-off');
    if (!active && activeRunIdx !== null) {
      markCompleted(activeRunIdx);
      activeRunIdx = null;
    }
    renderMatrix();
  }

  function markCompleted(idx) {
    const ts = new Date();
    completions[idx] = completions[idx] || [];
    completions[idx].push({ ts, duration_ms: null });
    persistCompletions();
  }

  function persistCompletions() {
    try {
      const snap = {};
      for (const k of Object.keys(completions)) {
        snap[k] = completions[k].map(c => ({ ts: c.ts.toISOString() }));
      }
      localStorage.setItem('gosteady_completions', JSON.stringify(snap));
    } catch (_) {}
  }

  function loadCompletions() {
    try {
      const raw = localStorage.getItem('gosteady_completions');
      if (!raw) return;
      const snap = JSON.parse(raw);
      for (const k of Object.keys(snap)) {
        completions[k] = snap[k].map(c => ({ ts: new Date(c.ts) }));
      }
    } catch (_) {}
  }

  function resetCompletions() {
    if (!confirm('Clear completed-row tracking AND POST-WALK notes for a new capture? '
               + '(This only resets the page-local log — files already on flash are untouched. '
               + 'Export your notes first if you want to keep them.)')) return;
    for (const k of Object.keys(completions)) delete completions[k];
    for (const k of Object.keys(postWalkNotes)) delete postWalkNotes[k];
    sessionCount = 0;
    persistCompletions();
    persistPostWalkNotes();
    renderMatrix();
    updateCounters();
  }

  function updateCounters() {
    sessionCountEl.textContent = String(sessionCount);
  }

  // ---- POST-WALK notes ---------------------------------------------

  const POST_WALK_LS_KEY = 'gosteady_post_walk_notes_v1';

  function persistPostWalkNotes() {
    try { localStorage.setItem(POST_WALK_LS_KEY, JSON.stringify(postWalkNotes)); }
    catch (_) {}
  }

  function loadPostWalkNotes() {
    try {
      const raw = localStorage.getItem(POST_WALK_LS_KEY);
      if (!raw) return;
      const snap = JSON.parse(raw);
      for (const uuid of Object.keys(snap)) postWalkNotes[uuid] = snap[uuid];
    } catch (_) {}
  }

  function savePostWalk(uuid, data) {
    postWalkNotes[uuid] = { ...data };
    persistPostWalkNotes();
  }

  function nowUtcIso() {
    return new Date().toISOString();
  }

  // ---- M3 post-walk popup ------------------------------------------

  const pwOverlay       = $('pw-overlay');
  const pwRunIdxEl      = $('pw-run-idx');
  const pwMetaEl        = $('pw-meta');
  const pwQuick         = $('pw-quick');
  const pwDiscardPanel  = $('pw-discard-panel');
  const pwNotesPanel    = $('pw-notes-panel');
  const pwDiscardReason = $('pw-discard-reason');
  const pwDiscardNotes  = $('pw-discard-notes');
  const pwValid         = $('pw-valid');
  const pwActual        = $('pw-actual');
  const pwSubjSpeed     = $('pw-subj-speed');
  const pwSteps         = $('pw-steps');
  const pwNotesDiscard  = $('pw-notes-discard');
  const pwEvents        = $('pw-events');
  const pwFree          = $('pw-free');

  function showPostWalkPopup() {
    if (!pwContext) return;
    const { run, sample_count } = pwContext;
    pwRunIdxEl.textContent = String(pwContext.run_idx);
    pwMetaEl.textContent =
      `${run.run_type} — ${run.intended_distance_ft} ft — ${run.intended_speed} — ${run.direction}` +
      ` · ${run.course_id}` +
      (sample_count !== null ? ` · samples=${sample_count}` : '');
    // Reset sub-panels; always show the quick buttons on open.
    pwQuick.style.display = '';
    pwDiscardPanel.classList.remove('open');
    pwNotesPanel.classList.remove('open');
    // Prefill the full form with defaults from the current run.
    pwValid.value = 'Y';
    pwActual.value = '';
    pwActual.placeholder = `(same as intended: ${run.intended_distance_ft})`;
    pwSubjSpeed.value = '';
    pwSteps.value = '';
    pwNotesDiscard.value = '';
    pwEvents.value = '';
    pwFree.value = '';
    pwDiscardReason.value = 'incomplete_run';
    pwDiscardNotes.value = '';
    pwOverlay.classList.add('open');
  }

  function closePostWalkPopup() {
    pwOverlay.classList.remove('open');
    pwContext = null;
  }

  function postWalkBaseRecord() {
    return {
      run_idx: pwContext.run_idx,
      completed_utc: nowUtcIso(),
      valid: 'Y',
      actual_distance_ft: null,
      subjective_speed: null,
      manual_step_count: null,
      events: '',
      discard_reason: '',
      free_notes: '',
      sample_count: pwContext.sample_count,
    };
  }

  function onQuickGood() {
    if (!pwContext) return;
    const rec = postWalkBaseRecord();
    // "Good" path: valid=Y, all defaults, no notes. Minimal friction.
    savePostWalk(pwContext.uuid, rec);
    log('sys', `run ${rec.run_idx} saved as valid (uuid=${pwContext.uuid.slice(0,8)}…)`);
    closePostWalkPopup();
    renderMatrix();
  }

  function onQuickDiscard() {
    pwQuick.style.display = 'none';
    pwDiscardPanel.classList.add('open');
  }

  function onQuickNotes() {
    pwQuick.style.display = 'none';
    pwNotesPanel.classList.add('open');
  }

  function onBack() {
    pwDiscardPanel.classList.remove('open');
    pwNotesPanel.classList.remove('open');
    pwQuick.style.display = '';
  }

  function onSaveDiscard() {
    if (!pwContext) return;
    const rec = postWalkBaseRecord();
    rec.valid = 'N';
    rec.discard_reason = pwDiscardReason.value;
    rec.free_notes = pwDiscardNotes.value.trim();
    savePostWalk(pwContext.uuid, rec);
    log('sys', `run ${rec.run_idx} saved as DISCARD (${rec.discard_reason})`);
    closePostWalkPopup();
    renderMatrix();
  }

  function onSaveFull() {
    if (!pwContext) return;
    const rec = postWalkBaseRecord();
    rec.valid = pwValid.value;
    const actual = pwActual.value.trim();
    rec.actual_distance_ft = actual === '' ? null : parseFloat(actual);
    rec.subjective_speed = pwSubjSpeed.value || null;
    const steps = pwSteps.value.trim();
    rec.manual_step_count = steps === '' ? null : parseInt(steps, 10);
    rec.events = pwEvents.value.trim();
    rec.discard_reason = pwNotesDiscard.value || '';
    rec.free_notes = pwFree.value.trim();
    // Sanity: if valid=N and no discard reason, coerce a default.
    if (rec.valid === 'N' && !rec.discard_reason) {
      rec.discard_reason = 'operator_error';
    }
    savePostWalk(pwContext.uuid, rec);
    log('sys', `run ${rec.run_idx} saved (valid=${rec.valid}${rec.discard_reason ? ', '+rec.discard_reason : ''})`);
    closePostWalkPopup();
    renderMatrix();
  }

  pwOverlay.addEventListener('click', (e) => {
    const action = e.target.getAttribute && e.target.getAttribute('data-pw-action');
    if (!action) return;
    if (action === 'good')          onQuickGood();
    else if (action === 'discard')  onQuickDiscard();
    else if (action === 'notes')    onQuickNotes();
    else if (action === 'back')     onBack();
    else if (action === 'save-discard') onSaveDiscard();
    else if (action === 'save-full')    onSaveFull();
  });

  // ---- Export capture notes ----------------------------------------

  function exportPostWalkNotes() {
    const payload = {
      schema_version: 1,
      exported_utc: nowUtcIso(),
      device_serial: null, // firmware reports it in each .dat header; join there
      notes: postWalkNotes,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    a.href = url;
    a.download = `gosteady_capture_notes_${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
    log('sys', `exported ${Object.keys(postWalkNotes).length} note(s)`);
  }

  // ---- Run matrix UI -----------------------------------------------

  function buildStartPayload(run) {
    return {
      ...COMMON,
      course_id: run.course_id,
      intended_distance_ft: run.intended_distance_ft,
      surface: run.surface,
      intended_speed: run.intended_speed,
      direction: run.direction,
      run_type: run.run_type,
    };
  }

  async function startRun(run) {
    if (sessionActive) {
      alert('A session is already recording. Press STOP first.');
      return;
    }
    const payload = buildStartPayload(run);
    const line = 'START ' + JSON.stringify(payload);
    activeRunIdx = run.idx;
    sessionCount += 1;
    updateCounters();
    renderMatrix();
    const ok = await sendCommand(line);
    if (!ok) { activeRunIdx = null; sessionCount -= 1; updateCounters(); renderMatrix(); }
  }

  async function stopRun() {
    if (!rxChar) return;
    await sendCommand('STOP');
    // setSessionActive(false) will fire on the OK samples= notification
  }

  function renderMatrix() {
    const matrix = $('run-matrix');
    matrix.innerHTML = '';
    const groups = {};
    for (const r of RUNS) (groups[r.group] = groups[r.group] || []).push(r);

    for (const groupKey of Object.keys(groups)) {
      const section = document.createElement('section');
      section.className = 'surface-group';
      const runs = groups[groupKey];
      const done = runs.filter(r => completions[r.idx]?.length).length;

      section.innerHTML = `
        <h2>
          ${GROUP_LABEL[groupKey]}
          <span class="count">${done} / ${runs.length}</span>
        </h2>
        <ul class="run-list"></ul>
      `;
      const list = section.querySelector('.run-list');

      for (const r of runs) {
        const li = document.createElement('li');
        li.className = 'run-row';
        const runCount = completions[r.idx]?.length || 0;
        if (runCount) li.classList.add('completed');
        if (activeRunIdx === r.idx) li.classList.add('active');

        const btn = document.createElement('button');
        btn.className = 'run-btn' + (activeRunIdx === r.idx ? ' active' : '');
        btn.disabled = !rxChar || sessionActive;
        btn.innerHTML = `
          <span class="title">${r.run_type} — ${r.intended_distance_ft} ft — ${r.intended_speed} — ${r.direction}</span>
          <span class="meta">${r.course_id}${r.note ? ' · ' + r.note : ''}</span>
        `;
        btn.addEventListener('click', () => startRun(r));

        const idx = document.createElement('div');
        idx.className = 'idx';
        idx.textContent = r.idx;

        const badge = document.createElement('div');
        badge.className = 'run-badge';
        if (runCount === 0) badge.textContent = '';
        else if (runCount === 1) {
          const t = completions[r.idx][0].ts.toTimeString().slice(0, 5);
          badge.textContent = t;
        } else {
          badge.textContent = `×${runCount}`;
        }

        li.appendChild(idx);
        li.appendChild(btn);
        li.appendChild(badge);
        list.appendChild(li);
      }

      matrix.appendChild(section);
    }
  }

  // ---- Wire up ------------------------------------------------------

  connBtn.addEventListener('click', () => {
    if (bleDevice && bleDevice.gatt.connected) disconnect();
    else connect();
  });
  stopBtn.addEventListener('click', stopRun);
  resetBtn.addEventListener('click', resetCompletions);
  $('export-btn').addEventListener('click', exportPostWalkNotes);

  // Sanity: is Web Bluetooth available?
  if (!navigator.bluetooth) {
    log('err', 'Web Bluetooth not supported. Use Chrome (desktop) or Chrome on Android.');
    connBtn.disabled = true;
    connBtn.textContent = 'Unsupported';
  }

  loadLog();           // restore persistent log buffer FIRST so any
                       // restoration messages from below are appended to
                       // existing history rather than starting fresh
  loadCompletions();
  loadPostWalkNotes();
  renderMatrix();
  updateCounters();

  // Wire the new log-management buttons.
  $('log-export').addEventListener('click', () => exportLog());
  $('log-clear').addEventListener('click', clearLog);

  log('sys', `ready — tap Connect to pair with the Thingy:91 X UART. `
            + `${logEntries.length} prior log entries persisted.`);

  // Periodic status poll so the UI tracks the firmware state even if
  // buttons are pressed elsewhere (e.g., SW0 on the bench).
  setInterval(() => {
    if (rxChar) sendCommand('STATUS').catch(() => {});
  }, 5000);
})();
</script>

</body>
</html>
